<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroIntel | AI Crop Recommendation</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <!-- Navigation Bar -->
      <nav class="navbar glass">
        <div class="nav-container">
          <div class="logo" onclick="window.navigate('landing')" style="white-space: nowrap;">
            <span class="logo-icon">🌿</span> AgroFarm AI
          </div>
          
          <div class="nav-links" id="main-nav-links" style="gap: 1.5rem; align-items: center; font-weight: 500; white-space: nowrap;">
            <a href="#" data-route="landing" class="nav-link active" style="white-space: nowrap;">Home</a>
            <a href="#" data-route="dashboard" class="nav-link" style="white-space: nowrap;">Dashboard</a>
            <a href="#" data-route="form" class="nav-link" style="white-space: nowrap;">AI Diagnosis</a>
            <a href="#" data-route="market" class="nav-link" style="white-space: nowrap;">Market</a>
            <a href="#" data-route="knowledge" class="nav-link" style="white-space: nowrap;">Resources</a>
          </div>
          
          <div style="display: flex; align-items: center; gap: 1rem;">
            <!-- Language Selector -->
            <select id="lang-toggle" class="input-field" style="padding: 0.35rem 0.75rem; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(46, 125, 50, 0.2); width: auto; font-size: 0.9rem; border-radius: 8px; font-weight: 500; cursor: pointer;">
              <option value="en">English</option>
              <option value="hi">हिंदी</option>
              <option value="mr">मराठी</option>
            </select>

            <div id="nav-auth-buttons" style="display: flex; align-items: center; gap: 0.8rem; white-space: nowrap;">
              <a href="#" data-route="login" class="nav-link" style="font-size: 0.9rem; font-weight: 600; white-space: nowrap;">Log in</a>
              <button class="btn-modern-signup" style="white-space: nowrap;" onclick="window.navigate('signup')">Sign up</button>
            </div>

            <!-- Profile Icon -->
            <div id="nav-user-menu" class="nav-item" style="display: none; align-items: center; gap: 1rem; position: relative;">
              <button id="user-avatar-btn" class="user-avatar-btn" title="My Account" style="background: var(--color-primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);">
                <span id="user-avatar-initials">SW</span>
              </button>
              <div class="dropdown-menu glass dropdown-menu-right" style="min-width: 240px; top: calc(100% + 0.75rem);">
                <div style="padding: 0.75rem 1rem 0.75rem; border-bottom: 1px solid var(--color-surface-container-high); margin-bottom: 0.25rem;">
                  <div id="user-menu-name" style="font-weight: 700; color: var(--color-primary); font-size: 0.95rem;">Farmer Profile</div>
                </div>
                <a href="#" data-route="profile" class="dropdown-link"><span class="nav-icon">👤</span> My Profile</a>
                <a href="#" onclick="window.logoutUser()" class="dropdown-link" style="color: #ba1a1a; margin-top: 0.5rem; border-top: 1px solid #eee; padding-top: 0.8rem;"><span class="nav-icon">🚪</span> Logout</a>
              </div>
            </div>
            
            <div class="mobile-menu-btn">☰</div>
          </div>
        </div>
      </nav>

      <!-- Main Content Container -->
      <main id="main-content">
        <!-- Rendered by JS -->
      </main>

      <footer style="text-align: center; padding: 2rem; border-top: 1px solid var(--color-surface-container-high); color: var(--color-on-surface-variant); margin-top: auto; font-size: 0.9rem;">
        <div style="margin-bottom: 0.5rem;">
          <strong>Contact us:</strong> support@agrofarmai.com | +91 800 123 4567
        </div>
        <div>
          &copy; 2026 AgroFarm AI. All rights reserved.
        </div>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
    <script>
      /* 3D Navbar: intensify shadow on scroll */
      (function () {
        var nav = document.querySelector('.navbar');
        window.addEventListener('scroll', function () {
          if (window.scrollY > 20) {
            nav.classList.add('scrolled');
          } else {
            nav.classList.remove('scrolled');
          }
        }, { passive: true });
      })();
    </script>
  </body>
</html>
